# configs/resnet18_sgd_steplr.yaml
experiment_name: "resnet18_sgd_steplr"
seed: 42
device: "cuda"

data:
  root: "./data"
  num_classes: 102
  batch_size: 64
  num_workers: 4

model:
  name: "resnet18"
  pretrained: true

training:
  num_epochs: 90
  optimizer: "sgd"
  learning_rate: 0.01
  momentum: 0.9
  weight_decay: 0.0001
  scheduler:
    type: "step_lr"
    step_size: 30
    gamma: 0.1

logging:
  log_dir: "logs"
  log_batch_loss: true
  comet:
    project_name: "augmentation-comparison"
    api_key: "MbL2psOHT82Uc7ML5Cd7TSvmR"              # или строка с ключом, либо через переменную COMET_API_KEY
    workspace: null
    disabled: false